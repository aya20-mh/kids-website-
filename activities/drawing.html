<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الرسم والتلوين - نجوم التعلم</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="activity-shared.css">
    <style>
        :root { --hero-start: #A29BFE; --hero-end: #6C5CE7; }

        .drawing-wrapper {
            display: flex; gap: 20px;
            flex-wrap: wrap; align-items: flex-start;
        }

        /* لوح الرسم */
        .canvas-area {
            flex: 1; min-width: 280px;
        }

        #drawingCanvas {
            width: 100%;
            max-width: 560px;
            display: block;
            border-radius: 18px;
            background: var(--white);
            box-shadow: 0 8px 25px rgba(0,0,0,0.12);
            cursor: crosshair;
            touch-action: none;
            border: 3px solid #ddd;
        }

        /* شريط الأدوات */
        .tools-panel {
            width: 200px;
            flex-shrink: 0;
        }

        .tool-section {
            background: var(--white);
            border-radius: 18px;
            padding: 16px;
            box-shadow: var(--card-shadow);
            margin-bottom: 15px;
        }

        .tool-section h4 {
            font-size: 0.9rem; color: var(--text-light);
            font-weight: 700; margin-bottom: 12px;
            text-transform: uppercase; letter-spacing: 0.5px;
        }

        /* لوحة الألوان */
        .color-palette {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 7px;
        }

        .color-dot {
            width: 100%; aspect-ratio: 1;
            border-radius: 50%;
            cursor: pointer;
            transition: var(--transition);
            border: 3px solid transparent;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }

        .color-dot:hover, .color-dot.selected {
            transform: scale(1.2);
            border-color: var(--text-dark);
        }

        /* حجم الفرشاة */
        .brush-sizes {
            display: flex; gap: 8px; align-items: center; justify-content: center;
        }

        .brush-btn {
            border: 2px solid #ddd;
            background: var(--white);
            border-radius: 50%;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .brush-btn:hover, .brush-btn.selected {
            border-color: var(--primary-color);
            background: rgba(108,92,231,0.1);
        }

        .brush-btn .brush-dot {
            border-radius: 50%;
            background: var(--text-dark);
            display: block;
        }

        /* أدوات الرسم */
        .draw-tools {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;
        }

        .draw-tool-btn {
            padding: 9px;
            border-radius: 10px;
            border: 2px solid #ddd;
            background: var(--white);
            font-family: 'Cairo', sans-serif;
            font-size: 0.8rem; font-weight: 600;
            cursor: pointer; transition: var(--transition);
            display: flex; align-items: center;
            justify-content: center; gap: 5px;
        }

        .draw-tool-btn:hover, .draw-tool-btn.active {
            border-color: var(--primary-color);
            background: rgba(108,92,231,0.1);
            color: var(--primary-color);
        }

        /* أزرار الإجراءات */
        .action-btns { display: flex; gap: 10px; flex-wrap: wrap; }
        .action-btn {
            flex: 1; min-width: 80px;
            padding: 10px 8px;
            border-radius: 12px; border: none;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem; font-weight: 700;
            cursor: pointer; transition: var(--transition);
            display: flex; align-items: center;
            justify-content: center; gap: 5px;
        }
        .btn-clear  { background: #FF7675; color: var(--white); }
        .btn-save   { background: var(--accent-green); color: var(--white); }
        .btn-undo   { background: #636E72; color: var(--white); }
        .action-btn:hover { transform: translateY(-2px); }

        /* معلومة الأداة الحالية */
        .current-info {
            text-align: center;
            padding: 8px;
            background: rgba(108,92,231,0.08);
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary-color);
            margin-bottom: 12px;
        }

        @media (max-width: 640px) {
            .drawing-wrapper { flex-direction: column; }
            .tools-panel { width: 100%; }
            .color-palette { grid-template-columns: repeat(8, 1fr); }
            .draw-tools { grid-template-columns: repeat(4, 1fr); }
        }
    </style>
</head>
<body>

<header class="top-bar">
    <div class="container header-content">
        <a href="../dashboard.html" class="logo">
            <i class="fas fa-rocket"></i><span>عالم التعلم</span>
        </a>
        <a href="../dashboard.html" class="back-btn">
            <i class="fas fa-arrow-right"></i><span>العودة</span>
        </a>
    </div>
</header>

<div class="page-hero">
    <span class="hero-icon">🎨</span>
    <h1>الرسم والتلوين</h1>
    <p>أطلق إبداعك وارسم ما يخطر ببالك!</p>
</div>

<main class="container">
    <div class="stars-bar">
        <i class="fas fa-palette"></i>
        <span>رسوماتي المحفوظة: <strong id="savedCount">0</strong> 🎨</span>
    </div>

    <section class="activity-section">
        <div class="drawing-wrapper">

            <!-- لوح الرسم -->
            <div class="canvas-area">
                <div class="current-info" id="currentInfo">🖌️ الأداة: فرشاة | اللون: أسود</div>
                <canvas id="drawingCanvas" width="560" height="420"></canvas>
            </div>

            <!-- شريط الأدوات -->
            <div class="tools-panel">

                <div class="tool-section">
                    <h4>🎨 الألوان</h4>
                    <div class="color-palette" id="colorPalette"></div>
                    <div style="margin-top:10px; display:flex; align-items:center; gap:8px;">
                        <label style="font-size:0.8rem; color:var(--text-light);">لون مخصص:</label>
                        <input type="color" id="customColor" value="#000000"
                            style="width:40px;height:30px;border:none;cursor:pointer;border-radius:6px;"
                            oninput="selectColor(this.value)">
                    </div>
                </div>

                <div class="tool-section">
                    <h4>🖌️ حجم الفرشاة</h4>
                    <div class="brush-sizes" id="brushSizes"></div>
                </div>

                <div class="tool-section">
                    <h4>⚙️ الأدوات</h4>
                    <div class="draw-tools">
                        <button class="draw-tool-btn active" id="toolBrush" onclick="setTool('brush')">
                            <i class="fas fa-paint-brush"></i> فرشاة
                        </button>
                        <button class="draw-tool-btn" id="toolEraser" onclick="setTool('eraser')">
                            <i class="fas fa-eraser"></i> ممحاة
                        </button>
                        <button class="draw-tool-btn" id="toolLine" onclick="setTool('line')">
                            <i class="fas fa-minus"></i> خط
                        </button>
                        <button class="draw-tool-btn" id="toolFill" onclick="setTool('fill')">
                            <i class="fas fa-fill-drip"></i> تعبئة
                        </button>
                    </div>
                </div>

                <div class="tool-section">
                    <h4>📂 إجراءات</h4>
                    <div class="action-btns">
                        <button class="action-btn btn-undo" onclick="undo()">
                            <i class="fas fa-undo"></i> تراجع
                        </button>
                        <button class="action-btn btn-clear" onclick="clearCanvas()">
                            <i class="fas fa-trash"></i> مسح
                        </button>
                    </div>
                    <button class="action-btn btn-save" style="width:100%;margin-top:10px;" onclick="saveDrawing()">
                        <i class="fas fa-download"></i> حفظ الرسمة
                    </button>
                </div>

            </div>
        </div>
    </section>
</main>

<footer class="page-footer"><p>صنع بحب ❤️ لتعليم أطفالنا</p></footer>

<script>
    const colors = [
        '#000000','#FFFFFF','#FF4757','#FF6B81',
        '#FFA502','#FFDD59','#2ED573','#26de81',
        '#1E90FF','#70a1ff','#A29BFE','#6C5CE7',
        '#FF6EB4','#fd79a8','#636E72','#b2bec3'
    ];
    const brushSizes = [4, 8, 14, 22];

    let currentColor = '#000000';
    let currentSize  = 8;
    let currentTool  = 'brush';
    let isDrawing    = false;
    let lastX = 0, lastY = 0;
    let history = [];
    let savedCount = parseInt(localStorage.getItem('savedDrawings') || '0');

    const canvas  = document.getElementById('drawingCanvas');
    const ctx     = canvas.getContext('2d');

    // === إعداد اللوح ===
    function initCanvas() {
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        saveState();
    }

    function getPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width  / rect.width;
        const scaleY = canvas.height / rect.height;
        if (e.touches) {
            return {
                x: (e.touches[0].clientX - rect.left) * scaleX,
                y: (e.touches[0].clientY - rect.top)  * scaleY
            };
        }
        return {
            x: (e.clientX - rect.left) * scaleX,
            y: (e.clientY - rect.top)  * scaleY
        };
    }

    // === رسم ===
    function startDraw(e) {
        e.preventDefault();
        const pos = getPos(e);
        if (currentTool === 'fill') { floodFill(Math.round(pos.x), Math.round(pos.y)); return; }
        isDrawing = true;
        [lastX, lastY] = [pos.x, pos.y];
        if (currentTool !== 'line') saveState();
    }

    function draw(e) {
        e.preventDefault();
        if (!isDrawing) return;
        const pos = getPos(e);
        ctx.lineWidth   = currentTool === 'eraser' ? currentSize * 3 : currentSize;
        ctx.strokeStyle = currentTool === 'eraser' ? '#FFFFFF' : currentColor;
        ctx.lineCap     = 'round';
        ctx.lineJoin    = 'round';
        ctx.globalCompositeOperation = currentTool === 'eraser' ? 'destination-out' : 'source-over';
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(pos.x, pos.y);
        ctx.stroke();
        [lastX, lastY] = [pos.x, pos.y];
    }

    function endDraw(e) {
        if (!isDrawing) return;
        isDrawing = false;
        ctx.globalCompositeOperation = 'source-over';
        saveState();
    }

    canvas.addEventListener('mousedown', startDraw);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', endDraw);
    canvas.addEventListener('mouseleave', endDraw);
    canvas.addEventListener('touchstart', startDraw, { passive: false });
    canvas.addEventListener('touchmove', draw, { passive: false });
    canvas.addEventListener('touchend', endDraw);

    // === Flood Fill ===
    function floodFill(startX, startY) {
        saveState();
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        const idx = (startY * canvas.width + startX) * 4;
        const targetR = data[idx], targetG = data[idx+1], targetB = data[idx+2];
        const fillColor = hexToRgb(currentColor);
        if (!fillColor) return;
        if (targetR===fillColor.r && targetG===fillColor.g && targetB===fillColor.b) return;

        const stack = [[startX, startY]];
        while (stack.length) {
            const [x, y] = stack.pop();
            if (x < 0 || x >= canvas.width || y < 0 || y >= canvas.height) continue;
            const i = (y * canvas.width + x) * 4;
            if (data[i]===targetR && data[i+1]===targetG && data[i+2]===targetB) {
                data[i] = fillColor.r; data[i+1] = fillColor.g;
                data[i+2] = fillColor.b; data[i+3] = 255;
                stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
            }
        }
        ctx.putImageData(imageData, 0, 0);
    }

    function hexToRgb(hex) {
        const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
        return r ? { r:parseInt(r[1],16), g:parseInt(r[2],16), b:parseInt(r[3],16) } : null;
    }

    // === لوحة الألوان ===
    function renderPalette() {
        const container = document.getElementById('colorPalette');
        container.innerHTML = '';
        colors.forEach(c => {
            const dot = document.createElement('div');
            dot.className = 'color-dot' + (c === currentColor ? ' selected' : '');
            dot.style.background = c;
            if (c === '#FFFFFF') dot.style.border = '2px solid #ddd';
            dot.onclick = () => selectColor(c);
            container.appendChild(dot);
        });
    }

    function selectColor(c) {
        currentColor = c;
        renderPalette();
        if (currentTool === 'eraser') setTool('brush');
        updateInfo();
    }

    function renderBrushSizes() {
        const container = document.getElementById('brushSizes');
        container.innerHTML = '';
        brushSizes.forEach(s => {
            const btn = document.createElement('button');
            btn.className = 'brush-btn' + (s === currentSize ? ' selected' : '');
            btn.style.cssText = `width:${s*2+20}px;height:${s*2+20}px;`;
            const dot = document.createElement('span');
            dot.className = 'brush-dot';
            dot.style.cssText = `width:${s}px;height:${s}px;`;
            btn.appendChild(dot);
            btn.onclick = () => { currentSize = s; renderBrushSizes(); };
            container.appendChild(btn);
        });
    }

    function setTool(tool) {
        currentTool = tool;
        document.querySelectorAll('.draw-tool-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('tool' + tool.charAt(0).toUpperCase() + tool.slice(1))?.classList.add('active');
        canvas.style.cursor = tool === 'eraser' ? 'cell' : tool === 'fill' ? 'copy' : 'crosshair';
        updateInfo();
    }

    function updateInfo() {
        const toolNames = { brush:'فرشاة', eraser:'ممحاة', line:'خط', fill:'تعبئة' };
        document.getElementById('currentInfo').innerHTML =
            `🖌️ الأداة: ${toolNames[currentTool]} | <span style="display:inline-block;width:14px;height:14px;background:${currentColor};border-radius:50%;border:1px solid #ddd;vertical-align:middle;"></span>`;
    }

    // === تاريخ التراجع ===
    function saveState() {
        if (history.length >= 20) history.shift();
        history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
    }

    function undo() {
        if (history.length <= 1) return;
        history.pop();
        ctx.putImageData(history[history.length - 1], 0, 0);
    }

    function clearCanvas() {
        saveState();
        ctx.fillStyle = '#FFFFFF';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function saveDrawing() {
        const link = document.createElement('a');
        link.download = `رسمتي_${Date.now()}.png`;
        link.href = canvas.toDataURL();
        link.click();
        savedCount++;
        localStorage.setItem('savedDrawings', savedCount);
        document.getElementById('savedCount').textContent = savedCount;
        showToast('🎨 تم حفظ رسمتك الجميلة! ⭐ +5 نجوم');
        createConfetti();
        try {
            const session = JSON.parse(localStorage.getItem('kidsAppSession') || 'null');
            if (session?.type === 'child') {
                const accounts = JSON.parse(localStorage.getItem('kidsAppAccounts') || 'null');
                if (accounts) {
                    const idx = accounts.children.findIndex(c => c.id === session.id);
                    if (idx !== -1) {
                        accounts.children[idx].stars = (accounts.children[idx].stars || 0) + 5;
                        localStorage.setItem('kidsAppAccounts', JSON.stringify(accounts));
                    }
                }
            }
        } catch(e) {}
    }

    function showToast(msg) {
        document.querySelector('.toast')?.remove();
        const t = document.createElement('div'); t.className = 'toast'; t.textContent = msg;
        document.body.appendChild(t); setTimeout(() => t.remove(), 3100);
    }

    function createConfetti() {
        for (let i = 0; i < 20; i++) {
            setTimeout(() => {
                const c = document.createElement('div'); c.className = 'confetti-piece';
                c.style.left = Math.random() * 100 + 'vw'; c.style.top = '-10px';
                c.style.background = `hsl(${Math.random() * 360}, 70%, 60%)`;
                c.style.animationDuration = (2 + Math.random() * 1.5) + 's';
                document.body.appendChild(c); setTimeout(() => c.remove(), 4000);
            }, i * 80);
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        try {
            const session = JSON.parse(localStorage.getItem('kidsAppSession') || 'null');
            if (!session || session.type !== 'child') { location.href = '../login.html'; return; }
        } catch(e) {}
        initCanvas();
        renderPalette();
        renderBrushSizes();
        updateInfo();
        document.getElementById('savedCount').textContent = savedCount;
    });
</script>
</body>
</html>
